name: Track Upstream & Deploy

# Detects new stable releases in krille-chan/fluffychat, builds a web bundle with our
# customizations (deploy/config.json overlay, root base-href, custom domain), deploys it to
# GitHub Pages at chat.housetoral.uk, and creates a matching release in this repo.
#
# Build, deploy, and release are separate jobs so that re-running the failed deploy job does
# not re-upload the Pages artifact (which would trip "Multiple artifacts named github-pages").

on:
  schedule:
    # Daily at 04:17 UTC. Offset from the hour to avoid GitHub's cron congestion.
    - cron: '17 4 * * *'
  workflow_dispatch:
    inputs:
      force_tag:
        description: 'Upstream tag to (re)build & deploy, even if already released here. Leave empty to track the latest stable release.'
        required: false
        type: string

concurrency:
  group: track-upstream
  cancel-in-progress: false

permissions:
  contents: write   # create releases & tags in this repo
  pages: write      # deploy to GitHub Pages
  id-token: write   # OIDC token required by actions/deploy-pages

env:
  UPSTREAM_REPO: krille-chan/fluffychat

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      skip: ${{ steps.resolve.outputs.skip }}
      target: ${{ steps.resolve.outputs.target }}
    steps:
      - name: Checkout this repo (deployment overlay)
        uses: actions/checkout@v4

      - name: Resolve target upstream release
        id: resolve
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          FORCE_TAG="${{ inputs.force_tag }}"
          if [ -n "$FORCE_TAG" ]; then
            TARGET="$FORCE_TAG"
            echo "Forced target tag: $TARGET"
          else
            # /releases/latest excludes drafts and pre-releases => stable only.
            TARGET="$(gh api "repos/${UPSTREAM_REPO}/releases/latest" --jq .tag_name)"
            echo "Latest upstream stable tag: $TARGET"
          fi
          echo "target=$TARGET" >> "$GITHUB_OUTPUT"

          # Skip if we've already released this tag, unless a force_tag was provided.
          if [ -z "$FORCE_TAG" ] && gh release view "$TARGET" -R "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release $TARGET already exists in ${{ github.repository }} — nothing to do."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Clone upstream at target tag
        if: steps.resolve.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "${{ steps.resolve.outputs.target }}" \
            "https://github.com/${UPSTREAM_REPO}.git" upstream

      - name: Apply config overlay
        if: steps.resolve.outputs.skip == 'false'
        run: cp deploy/config.json upstream/web/config.json

      - name: Set up Flutter
        if: steps.resolve.outputs.skip == 'false'
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: upstream/.tool_versions.yaml
          cache: true

      - name: Set up Rust
        if: steps.resolve.outputs.skip == 'false'
        uses: dtolnay/rust-toolchain@stable

      - name: Add rust-src component (nightly)
        if: steps.resolve.outputs.skip == 'false'
        run: rustup component add rust-src --toolchain nightly-x86_64-unknown-linux-gnu

      - name: Build web (root base-href)
        if: steps.resolve.outputs.skip == 'false'
        working-directory: upstream
        run: |
          set -euo pipefail
          ./scripts/prepare-web.sh
          rm ./assets/vodozemac/.gitignore
          flutter pub get
          flutter build web \
            --dart-define=FLUTTER_WEB_CANVASKIT_URL=canvaskit/ \
            --release --source-maps --base-href "/"

      - name: Add custom domain (CNAME)
        if: steps.resolve.outputs.skip == 'false'
        run: cp deploy/CNAME upstream/build/web/CNAME

      - name: Upload Pages artifact
        if: steps.resolve.outputs.skip == 'false'
        uses: actions/upload-pages-artifact@v3
        with:
          path: upstream/build/web

      - name: Package release bundle
        if: steps.resolve.outputs.skip == 'false'
        run: tar -czf "toralchat-web-${{ steps.resolve.outputs.target }}.tar.gz" -C upstream/build/web .

      - name: Upload release bundle
        if: steps.resolve.outputs.skip == 'false'
        uses: actions/upload-artifact@v4
        with:
          name: release-bundle
          path: toralchat-web-${{ steps.resolve.outputs.target }}.tar.gz
          if-no-files-found: error

  build_macos:
    needs: build
    if: needs.build.outputs.skip == 'false'
    # macos-14 runners are Apple Silicon => native arm64 build.
    runs-on: macos-14
    env:
      TARGET: ${{ needs.build.outputs.target }}
    steps:
      - name: Clone upstream at target tag
        run: |
          set -euo pipefail
          git clone --depth 1 --branch "$TARGET" \
            "https://github.com/${UPSTREAM_REPO}.git" upstream

      - name: Force manual ad-hoc signing (no Apple account)
        working-directory: upstream
        run: |
          set -euo pipefail
          # Upstream pins krille-chan's DEVELOPMENT_TEAM and uses Automatic signing, which
          # fails on CI without their account. Switch every config to Manual ad-hoc signing
          # (identity "-", no team / no provisioning profile). xcodebuild still applies the
          # Release.entitlements (sandbox + network client), so the app launches locally.
          sed -i '' \
            -e 's/DEVELOPMENT_TEAM = [A-Z0-9]*;/DEVELOPMENT_TEAM = "";/g' \
            -e 's/CODE_SIGN_STYLE = Automatic;/CODE_SIGN_STYLE = Manual;/g' \
            -e 's/CODE_SIGN_IDENTITY = "Apple Development";/CODE_SIGN_IDENTITY = "-";/g' \
            macos/Runner.xcodeproj/project.pbxproj

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version-file: upstream/.tool_versions.yaml
          cache: true

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Build macOS (arm64, ad-hoc signed)
        working-directory: upstream
        run: |
          set -euo pipefail
          flutter config --enable-macos-desktop
          # Disable Swift Package Manager: with SPM on, the shared darwin plugins (e.g.
          # video_player_avfoundation) resolve `@import Flutter` instead of FlutterMacOS and
          # fail with "module 'Flutter' not found". Force the pure CocoaPods path.
          flutter config --no-enable-swift-package-manager
          flutter pub get
          # Build arm64 only. The default universal (x86_64+arm64) build cross-compiles the
          # webcrypto/BoringSSL native asset for x86_64 on the arm64 runner, which fails to
          # link the fiat_p256 ADX assembly. We only target Apple Silicon. ARCHS is forwarded
          # to xcodebuild via Flutter's FLUTTER_XCODE_* passthrough.
          export FLUTTER_XCODE_ARCHS=arm64
          flutter build macos --release

      - name: Package .app as zip
        working-directory: upstream
        run: |
          set -euo pipefail
          APP="build/macos/Build/Products/Release/FluffyChat.app"
          # xcodebuild already ad-hoc signed the app with its entitlements; just verify and zip.
          codesign --verify --verbose=2 "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" \
            "../toralchat-macos-arm64-${TARGET}.zip"

      - name: Upload macOS bundle
        uses: actions/upload-artifact@v4
        with:
          name: macos-bundle
          path: toralchat-macos-arm64-${{ env.TARGET }}.zip
          if-no-files-found: error

  deploy:
    needs: build
    if: needs.build.outputs.skip == 'false'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4

  release:
    needs: [build, deploy, build_macos]
    if: needs.build.outputs.skip == 'false'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TARGET: ${{ needs.build.outputs.target }}
    steps:
      - name: Download web bundle
        uses: actions/download-artifact@v4
        with:
          name: release-bundle

      - name: Download macOS bundle
        uses: actions/download-artifact@v4
        with:
          name: macos-bundle

      - name: Create or update release
        run: |
          set -euo pipefail
          ASSETS=( "toralchat-web-${TARGET}.tar.gz" "toralchat-macos-arm64-${TARGET}.zip" )
          if gh release view "$TARGET" -R "${{ github.repository }}" >/dev/null 2>&1; then
            # Forced rebuild of an existing release: refresh the assets.
            gh release upload "$TARGET" "${ASSETS[@]}" \
              -R "${{ github.repository }}" --clobber
          else
            gh release create "$TARGET" "${ASSETS[@]}" \
              -R "${{ github.repository }}" \
              --title "Toral Chat ${TARGET}" \
              --notes "Built from upstream ${UPSTREAM_REPO} ${TARGET}. Web deployed to https://chat.housetoral.uk. macOS (Apple Silicon) app attached below — it is ad-hoc signed (not notarized), so on first launch right-click the app and choose Open, or run: xattr -dr com.apple.quarantine /Applications/FluffyChat.app"
          fi
